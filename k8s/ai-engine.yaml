apiVersion: apps/v1
kind: Deployment
metadata:
  name: livesys-ai-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livesys-ai-engine
  template:
    metadata:
      labels:
        app: livesys-ai-engine
    spec:
      containers:
      - name: ai-engine
        image: <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/livesys-ai-engine:latest
        ports:
        - containerPort: 6000
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "livesys-kafka:9092"
        - name: PORT
          value: "6000"
---
apiVersion: v1
kind: Service
metadata:
  name: livesys-ai-engine
spec:
  type: ClusterIP
  ports:
  - port: 6000
  selector:
    app: livesys-ai-engine
