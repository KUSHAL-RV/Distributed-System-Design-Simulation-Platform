apiVersion: apps/v1
kind: Deployment
metadata:
  name: livesys-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: livesys-gateway
  template:
    metadata:
      labels:
        app: livesys-gateway
    spec:
      containers:
      - name: gateway
        image: <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/livesys-gateway:latest
        ports:
        - containerPort: 4000
        env:
        - name: DATABASE_URL
          value: "postgresql://livesys:livesys_secret_2024@livesys-postgres:5432/livesysdesign"
        - name: REDIS_URL
          value: "redis://livesys-redis:6379"
        - name: SIM_ENGINE_URL
          value: "livesys-sim-engine:5000"
        - name: AI_ENGINE_URL
          value: "http://livesys-ai-engine:6000"
        - name: JWT_SECRET
          value: "livesysdesign_jwt_secret_dev"
---
apiVersion: v1
kind: Service
metadata:
  name: livesys-gateway
spec:
  type: ClusterIP
  ports:
  - port: 4000
  selector:
    app: livesys-gateway
