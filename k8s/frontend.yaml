apiVersion: apps/v1
kind: Deployment
metadata:
  name: livesys-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: livesys-frontend
  template:
    metadata:
      labels:
        app: livesys-frontend
    spec:
      containers:
      - name: frontend
        image: <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/livesys-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://livesys-gateway:4000"
---
apiVersion: v1
kind: Service
metadata:
  name: livesys-frontend
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: livesys-frontend
