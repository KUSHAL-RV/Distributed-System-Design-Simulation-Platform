apiVersion: apps/v1
kind: Deployment
metadata:
  name: livesys-sim-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: livesys-sim-engine
  template:
    metadata:
      labels:
        app: livesys-sim-engine
    spec:
      containers:
      - name: sim-engine
        image: <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/livesys-sim-engine:latest
        ports:
        - containerPort: 5000
        env:
        - name: REDIS_URL
          value: "livesys-redis:6379"
        - name: PORT
          value: "5000"
---
apiVersion: v1
kind: Service
metadata:
  name: livesys-sim-engine
spec:
  type: ClusterIP
  ports:
  - port: 5000
  selector:
    app: livesys-sim-engine
