apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: livesys-postgres
spec:
  serviceName: "livesys-postgres"
  replicas: 1
  selector:
    matchLabels:
      app: livesys-postgres
  template:
    metadata:
      labels:
        app: livesys-postgres
    spec:
      containers:
      - name: postgres
        image: timescale/timescaledb-ha:pg16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: livesys
        - name: POSTGRES_PASSWORD
          value: livesys_secret_2024
        - name: POSTGRES_DB
          value: livesysdesign
---
apiVersion: v1
kind: Service
metadata:
  name: livesys-postgres
spec:
  ports:
  - port: 5432
  selector:
    app: livesys-postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livesys-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livesys-redis
  template:
    metadata:
      labels:
        app: livesys-redis
    spec:
      containers:
      - name: redis
        image: redis:7.2-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: livesys-redis
spec:
  ports:
  - port: 6379
  selector:
    app: livesys-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livesys-zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livesys-zookeeper
  template:
    metadata:
      labels:
        app: livesys-zookeeper
    spec:
      containers:
      - name: zookeeper
        image: confluentinc/cp-zookeeper:7.6.0
        ports:
        - containerPort: 2181
        env:
        - name: ZOOKEEPER_CLIENT_PORT
          value: "2181"
        - name: ZOOKEEPER_TICK_TIME
          value: "2000"
---
apiVersion: v1
kind: Service
metadata:
  name: livesys-zookeeper
spec:
  ports:
  - port: 2181
  selector:
    app: livesys-zookeeper
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livesys-kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livesys-kafka
  template:
    metadata:
      labels:
        app: livesys-kafka
    spec:
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.6.0
        ports:
        - containerPort: 9092
        env:
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "livesys-zookeeper:2181"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://livesys-kafka:9092,PLAINTEXT_HOST://localhost:29092"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: livesys-kafka
spec:
  ports:
  - port: 9092
  selector:
    app: livesys-kafka
