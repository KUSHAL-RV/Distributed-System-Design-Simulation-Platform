name: LiveSysDesign CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify-build:
    name: Build & Verify Services
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Verify Frontend Build
      run: |
        cd frontend
        npm install
        npm run build

    - name: Verify Gateway Build
      run: |
        cd gateway
        npm install
        npm run build

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Verify Sim Engine Build
      run: |
        cd sim-engine
        go build ./...

    - name: Build Docker Images (Sanity Check)
      run: |
        docker build -t livesys-frontend:test ./frontend
        docker build -t livesys-gateway:test ./gateway
        docker build -t livesys-sim-engine:test ./sim-engine
        docker build -t livesys-ai-engine:test ./ai-engine
